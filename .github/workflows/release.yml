name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, for example 0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode with Swift 6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift version
        run: swift --version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Ghostty build dependency
        run: brew install zig@0.15

      - name: Build release archive
        env:
          GSDE_VERSION: ${{ steps.version.outputs.version }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          GSDE_ADHOC_SIGN: '1'
        run: make libghostty release-adhoc

      - name: Compute checksum and release size
        id: checksum
        shell: bash
        run: |
          archive=$(cat dist/latest-release.txt)
          sha=$(shasum -a 256 "$archive" | awk '{print $1}')
          size_bytes=$(stat -f%z "$archive")
          size_mib=$(python3 - <<PY
          size = int("$size_bytes")
          print(f"{size / 1024 / 1024:.2f}")
          PY
          )
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$size_bytes" >> "$GITHUB_OUTPUT"
          echo "size_mib=$size_mib" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$sha" "$(basename "$archive")" > "$archive.sha256"
          echo "Release archive: $archive"
          echo "Release archive size: ${size_bytes} bytes (${size_mib} MiB)"

      - name: Upload GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          ARCHIVE: ${{ steps.checksum.outputs.archive }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
          SIZE_BYTES: ${{ steps.checksum.outputs.size_bytes }}
          SIZE_MIB: ${{ steps.checksum.outputs.size_mib }}
        run: |
          retry() {
            local attempt=1
            local max_attempts=5
            until "$@"; do
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              local delay=$((attempt * 10))
              echo "Command failed; retrying in ${delay}s (${attempt}/${max_attempts}): $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
            done
          }

          notes="SHA-256: \`${SHA256}\`
          Size: ${SIZE_BYTES} bytes (${SIZE_MIB} MiB)"

          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            retry gh release edit "$tag" \
              --title "GSDE ${tag}" \
              --notes "$notes"
          else
            retry gh release create "$tag" \
              --title "GSDE ${tag}" \
              --notes "$notes"
          fi
          retry gh release upload "$tag" "$ARCHIVE" "$ARCHIVE.sha256" --clobber

      - name: Update Homebrew cask on main
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCHIVE: ${{ steps.checksum.outputs.archive }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          scripts/update-homebrew-formula.sh "$VERSION" "$ARCHIVE" "$REPOSITORY"

          if git diff --quiet -- Casks/gsde.rb Formula/gsde.rb; then
            echo "Homebrew cask is already current."
            exit 0
          fi

          git add Casks/gsde.rb
          git rm -f Formula/gsde.rb 2>/dev/null || true
          git commit -m "Update Homebrew cask for v${VERSION}"
          git push origin main
